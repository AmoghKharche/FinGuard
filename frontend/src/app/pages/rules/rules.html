<div class="container-fluid">

    <h4 class="mb-4">Rule Configuration</h4>
  
    <div *ngIf="loading" class="text-center py-4">
      Loading rules...
    </div>
  
    <div *ngIf="!loading">
  
      <div class="row g-4">
  
        <div class="col-md-6" *ngFor="let rule of rules">
          <div class="card shadow-sm p-3">

            <h6 class="mb-2 text-danger">{{ rule.rule_type }}</h6>
            <p *ngIf="ruleDescriptions[rule.rule_type]" class="text-muted small mb-3">
              {{ ruleDescriptions[rule.rule_type] }}
            </p>

            <div class="mb-3">
              <label class="form-label">Threshold</label>
              <input
                type="number"
                class="form-control"
                [(ngModel)]="rule.threshold"
              />
            </div>
  
            <div class="mb-3">
              <label class="form-label">Severity</label>
              <input
                type="number"
                class="form-control"
                [(ngModel)]="rule.severity"
              />
            </div>
  
            <div class="mb-3">
              <label class="form-label">Window (seconds)</label>
              <input
                type="number"
                class="form-control"
                [(ngModel)]="rule.window_seconds"
              />
            </div>

            <ng-container *ngIf="rule.rule_type === 'SUSPICIOUS_HOURS_V1'">
              <div class="mb-3">
                <label class="form-label">Start hour (IST, 0–23)</label>
                <input
                  type="number"
                  min="0"
                  max="23"
                  class="form-control"
                  [(ngModel)]="rule.start_hour"
                />
              </div>
              <div class="mb-3">
                <label class="form-label">End hour (IST, 0–23)</label>
                <input
                  type="number"
                  min="0"
                  max="23"
                  class="form-control"
                  [(ngModel)]="rule.end_hour"
                />
              </div>
            </ng-container>
  
            <button
              class="btn btn-primary w-100"
              [disabled]="savingRule === rule.rule_type"
              (click)="saveRule(rule)"
            >
              {{ savingRule === rule.rule_type ? 'Saving...' : 'Save Changes' }}
            </button>
  
          </div>
        </div>
  
      </div>
  
    </div>
  
  </div>
